name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /var/www/html
            sudo rm -rf *
            sudo git clone https://github.com/Ironhack-Archive/online-clone-amazon.git /tmp/app
            sudo mv /tmp/app/* .
            sudo rm -rf /tmp/app
            sudo systemctl restart nginx
